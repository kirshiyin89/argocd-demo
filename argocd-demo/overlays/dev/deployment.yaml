apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-{{env}}  # Replace manually or with kustomize patches
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-container
        image: nginx:latest
